<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f0e0" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Amerika 2026" />
    <meta name="description" content="Soukromý deník z cesty po USA 2026" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Amerika 2026</title>
    <script>
      // Anti-flash: apply persisted theme before the first paint.
      (function () {
        try {
          var THEMES = ["light","dark","sunset","sepia"];
          var DARK = ["dark","sunset"];
          var t = localStorage.getItem("travel-diary-theme");
          if (THEMES.indexOf(t) === -1) t = "light";
          var root = document.documentElement;
          root.dataset.theme = t;
          if (DARK.indexOf(t) !== -1) root.classList.add("dark");
          root.style.colorScheme = DARK.indexOf(t) !== -1 ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
